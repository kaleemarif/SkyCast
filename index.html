<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyCast</title>

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>
<body>

  <!-- Weather Effects -->
  <div class="weather-effects"></div>

  <div class="container">

    <div class="weather-card">

      <!-- Logo -->
      <div class="logo">
        <i class="fa-solid fa-cloud-sun"></i>
        <h1>SkyCast</h1>
      </div>

      <!-- Search -->
      <div class="search-box">
        <input
          type="text"
          id="cityInput"
          placeholder="Search city..."
        />

        <button id="searchBtn">
          <button id="saveCityBtn">
  <i class="fa-solid fa-star"></i>
          </button>
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>

        <button id="locationBtn">
          <i class="fa-solid fa-location-crosshairs"></i>
        </button>
      </div>

      <!-- Weather Icon -->
      <div class="weather-icon">
        <img id="weatherIcon" src="" alt="Weather Icon" />
      </div>

      <!-- Temperature -->
      <h1 id="temperature">--°C</h1>

      <!-- Condition -->
      <h2 id="weatherCondition">Weather</h2>

      <!-- City -->
      <p id="cityName">Search a city</p>

      <!-- Weather Details -->
      <div class="weather-details">

        <div class="detail-card">
          <i class="fa-solid fa-droplet"></i>
          <div>
            <span>Humidity</span>
            <h4 id="humidity">--%</h4>
          </div>
        </div>

        <div class="detail-card">
          <i class="fa-solid fa-wind"></i>
          <div>
            <span>Wind</span>
            <h4 id="wind">-- km/h</h4>
          </div>
        </div>

        <div class="detail-card">
          <i class="fa-solid fa-temperature-half"></i>
          <div>
            <span>Feels Like</span>
            <h4 id="feelsLike">--°C</h4>
          </div>
        </div>

        <div class="detail-card">
          <i class="fa-solid fa-eye"></i>
          <div>
            <span>Visibility</span>
            <h4 id="visibility">-- km</h4>
          </div>
        </div>

      </div>

      <!-- Forecast -->
      <div class="forecast-section">

        <h3>5-Day Forecast</h3>

        <div class="forecast-container" id="forecastContainer"></div>

      </div>
      <!-- Hourly Forecast -->

<section class="hourly-section">

  <h2>Hourly Forecast</h2>

  <div class="hourly-container" id="hourlyContainer">

  </div>

</section>
  <!-- AQI Section -->

<section class="aqi-section">

  <h2>Air Quality Index</h2>

  <div class="aqi-card">

    <div class="aqi-value" id="aqiValue">
      --
    </div>

    <div class="aqi-status" id="aqiStatus">
      Unknown
    </div>

  </div>

</section>
      <!-- Favorite Cities -->

<section class="favorites-section">

  <h2>Favorite Cities</h2>

  <div class="favorites-container" id="favoritesContainer">

  </div>

</section>
      <!-- WEATHER MAP -->

<section class="map-section">

  <h2>Weather Map</h2>

  <div class="map-container">

    <iframe
      id="weatherMap"
      src=""
      loading="lazy">
    </iframe>

  </div>

</section>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
